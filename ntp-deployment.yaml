# deploy NTP container
apiVersion: v1
kind: Pod 
metadata:
  name: ntp-deployment 
  labels:
    app: ntp-deployment
spec:
  containers:
  - name: ntp
    image: cturra/ntp:latest
    securityContext:
      capabilities:
        add:
          - SYS_TIME
---
apiVersion: v1
kind: Pod
metadata:
  name: web-deployment
  namespace: default
  labels:
    app: web-deployment
spec:
  containers:
    - name: nginx
      image: nginx:latest
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ntp-service  
spec:
  selector:
    app: ntp-deployment
  ports:
  - protocol: UDP
    port: 123
    targetPort: 123
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: web-deployment
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ntp-policy
  namespace: default
spec:
  endpointSelector:
    matchLabels:
      app: ntp-deployment
  ingress:
    - fromCIDR:
      - 192.168.15.0/24
      toPorts:
        - ports:
          - port: "123"
            protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  namespace: default
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 80
